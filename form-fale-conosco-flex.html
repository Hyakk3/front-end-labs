<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/fale-conosco.css">
</head>
<body class="fale-conosco-body animate-fade-in">
    <main class="container" id="form-container">
        <header>
            <h1>Fale Conosco</h1>
            <p class="subtitle">Estamos aqui para ajudar! Preencha o formulário abaixo e entraremos em contato com você o mais breve possível.</p>
        </header>
        
        <form action="form-fale-conosco-flex.html" method="get">
            <div class="form-row">
                <label for="primeiro-nome">Primeiro Nome</label>
                <input type="text" id="primeiro-nome" name="primeiro-nome" placeholder="Seu nome..">
            </div>
            
            <div class="form-row">
                <label for="ultimo-nome">Último Nome</label>
                <input type="text" id="ultimo-nome" name="ultimo-nome" placeholder="Seu sobrenome..">
            </div>
            
            <div class="form-row">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Seu e-mail.">
            </div>
            
            <div class="form-row">
                <label for="pais">País</label>
                <select id="pais" name="pais">
                    <option value="" disabled selected>Selecione</option>
                    <option value="br">Brasil</option>
                    <option value="pt">Portugal</option>
                    <option value="us">Estados Unidos</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            
            <div class="form-row">
                <label for="assunto">Assunto</label>
                <textarea id="assunto" name="assunto" placeholder="Escreva aqui.."></textarea>
            </div>
            
            <div class="form-actions">
                <button type="reset" class="btn-limpar">Limpar</button>
                <button type="submit" class="btn-enviar">Enviar</button>
            </div>
        </form>

        <footer class="contact-info">
            Em caso de dúvidas entre em contato 📞
        </footer>
    </main>

    <main class="container" id="success-container" style="display: none; text-align: center; justify-content: center; align-items: center; min-height: 300px;">
        <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
        <h1>Mensagem Enviada!</h1>
        <p class="subtitle">Sua mensagem foi enviada com sucesso. Em breve entraremos em contato.</p>
        <div style="margin-top: 20px;">
            <a href="form-fale-conosco-flex.html" class="btn-enviar" style="text-decoration: none; display: inline-block; width: auto; padding: 12px 30px;">Voltar ao Formulário</a>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('email')) {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-container').style.display = 'flex';
        }
    </script>
</body>
</html>
