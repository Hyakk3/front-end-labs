<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mapa Pixel</title>

<style>
  :root{
    --bg:#0b1020;
    --px:14px;
    --gap:2px;
  }

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background: radial-gradient(800px 500px at 50% 35%, #1a2b5a 0%, var(--bg) 55%, #060912 100%);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .pixel{
    display:grid;
    grid-template-columns: repeat(var(--w), var(--px));
    grid-template-rows: repeat(var(--h), var(--px));
    gap: var(--gap);
    padding:24px;
    background: rgba(17,24,51,.92);
    border-radius:14px;
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }

  .p{
    width:var(--px);
    height:var(--px);
    border-radius:3px;
    background: transparent;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
  }
</style>
</head>

<body>

<div class="pixel" id="mapa" style="--w:33; --h:28;"></div>

<script>
const w = 33;
const h = 28;

const cor_circulo = "#5dade2";
const cor_coluna = "#f7dc6f";
const vazio = null;

const grid = Array.from({ length: h }, () => Array.from({ length: w }, () => vazio));

// centro da coluna
const xc = Math.floor(w / 2);

// coluna grossa (3 de largura)
const largura = 1; // -1,0,+1 => 3 pixels

// === círculos (mantém exatamente onde estavam) ===
const y_base_circulos = 13;
const raio = 6;

const y_centro = y_base_circulos + raio;
const x_esq = (xc - largura - 1) - raio;
const x_dir = (xc + largura + 1) + raio;

function dentro_do_circulo(x, y, x0, y0, r){
  const dx = x - x0;
  const dy = y - y0;
  return (dx*dx + dy*dy) <= (r*r);
}

// desenha círculos primeiro
for (let y = 0; y < h; y++){
  for (let x = 0; x < w; x++){
    const esq = dentro_do_circulo(x, y, x_esq, y_centro, raio);
    const dir = dentro_do_circulo(x, y, x_dir, y_centro, raio);
    if (esq || dir) grid[y][x] = cor_circulo;
  }
}

// === coluna (reta e esticada pra grudar na base de baixo) ===
// estica até a base visual (mesmo nível do fundo dos círculos)
const y_topo_coluna = 0;
const y_fim_coluna = Math.min(h - 1, y_base_circulos + (raio * 2) - 1); // chega no "chão" dos círculos

for (let y = y_topo_coluna; y <= y_fim_coluna; y++){
  for (let dx = -largura; dx <= largura; dx++){
    grid[y][xc + dx] = cor_coluna; // reta, sem afinar
  }
}

// render
const mapa = document.getElementById("mapa");
for (let y = 0; y < h; y++){
  for (let x = 0; x < w; x++){
    const d = document.createElement("div");
    d.className = "p";
    if (grid[y][x]) d.style.background = grid[y][x];
    mapa.appendChild(d);
  }
}
</script>

</body>
</html>
