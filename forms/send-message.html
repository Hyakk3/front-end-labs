<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enviar Mensagem para a Mirror Fashion">
    <title>Enviar Mensagem | Mirror Fashion</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="forms-body animate-fade-in">

    <main class="form-card" id="form-container">
        <header>
            <h1>Enviar Mensagem</h1>
            <p class="subtitle">Use o formulário abaixo para nos enviar uma mensagem rápida.</p>
        </header>

        <form action="send-message.html" method="get">
            <div class="form-field">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-field">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn-cancel">Limpar</button>
                <button type="submit" class="btn-submit">Enviar</button>
            </div>
        </form>

        <footer>
            Mirror Fashion Labs
        </footer>
    </main>

    <main class="form-card" id="success-container" style="display: none; text-align: center; align-items: center;">
        <div style="font-size: 60px;">✅</div>
        <h1>Mensagem Enviada!</h1>
        <p class="subtitle">Sua mensagem foi enviada com sucesso. Em breve entraremos em contato.</p>
        <div>
            <a href="send-message.html" class="btn-submit" style="text-decoration: none; display: inline-block; padding: 12px 30px;">Enviar Outra</a>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('nome')) {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-container').style.display = 'grid';
        }
    </script>
</body>
</html>
