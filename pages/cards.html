<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards de Ofertas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/components/cards.css">
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <h2>Gratuito</h2>
            <div class="price-container" title="Reais por mês">
                <div class="price">
                    <span class="currency">R$</span>
                    <span class="value">0</span>
                    <span class="period">/mês</span>
                </div>
            </div>
            <ul class="features">
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    1 usuário
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    3 contas de design
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    Suporte por e-mail
                </li>
            </ul>
            <button class="btn">Escolher plano</button>
        </div>

        <div class="card elite">
            <h2>Elite</h2>
            <div class="price-container" title="Reais por mês">
                <div class="price">
                    <span class="currency">R$</span>
                    <span class="value">99</span>
                    <span class="period">/mês</span>
                </div>
            </div>
            <ul class="features">
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    Usuários ilimitados
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    10 contas de design
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    100 implantações
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    Suporte 24h por dia
                </li>
            </ul>
            <button class="btn">Escolher plano</button>
        </div>

        <div class="card">
            <h2>Profissional</h2>
            <div class="price-container" title="Reais por mês">
                <div class="price">
                    <span class="currency">R$</span>
                    <span class="value">49</span>
                    <span class="period">/mês</span>
                </div>
            </div>
            <ul class="features">
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    100 usuários
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    3 contas de design
                </li>
                <li>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b6de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"></rect>
                        <polyline points="9 12 12 15 16 9"></polyline>
                    </svg>
                    Suporte por e-mail
                </li>
            </ul>
            <button class="btn">Escolher plano</button>
        </div>
    </div>
</body>
</html>
